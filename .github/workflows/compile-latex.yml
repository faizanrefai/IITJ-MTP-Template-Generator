name: Compile LaTeX to PDF

on:
  push:
    branches: [main, master]
    paths:
      - "output/**/*.tex"
      - ".github/workflows/compile-latex.yml"
  workflow_dispatch:
    inputs:
      report_path:
        description: "Path to report directory (e.g., output/my-project)"
        required: false
        default: "output"

jobs:
  compile-latex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache LaTeX packages
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/texlive
            ~/.texlive
          key: ${{ runner.os }}-texlive-full-2023
          restore-keys: |
            ${{ runner.os }}-texlive-full-
            ${{ runner.os }}-texlive-

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-bibtex-extra \
            texlive-science \
            texlive-publishers \
            texlive-lang-english \
            biber

      - name: Find and compile LaTeX files
        run: |
          # Function to compile a LaTeX file with better error handling
          compile_latex() {
            local tex_file="$1"
            local dir=$(dirname "$tex_file")
            local base=$(basename "$tex_file" .tex)
            
            echo ""
            echo "=========================================="
            echo "📝 Compiling: $tex_file"
            echo "=========================================="
            cd "$dir"
            
            # First pass - stop on error
            echo "🔨 First pass (pdflatex)..."
            if ! pdflatex -interaction=nonstopmode -halt-on-error "$base.tex" > /dev/null 2>&1; then
              echo "❌ LaTeX compilation failed for $tex_file"
              echo "   Showing error details:"
              pdflatex -interaction=nonstopmode "$base.tex" 2>&1 | grep -A 5 -B 5 "Error\|! "
              cd - > /dev/null
              return 1
            fi
            echo "   ✓ First pass completed"
            
            # Run bibtex if .bib file exists and aux file references it
            if [ -f "$base.aux" ] && grep -q "bibdata" "$base.aux"; then
              echo "📚 Running BibTeX..."
              if ! bibtex "$base" > /dev/null 2>&1; then
                echo "⚠️  BibTeX had warnings, but continuing..."
              else
                echo "   ✓ BibTeX completed"
              fi
            fi
            
            # Second pass
            echo "🔨 Second pass (pdflatex)..."
            if ! pdflatex -interaction=nonstopmode -halt-on-error "$base.tex" > /dev/null 2>&1; then
              echo "⚠️  Second pass had issues, but continuing..."
            else
              echo "   ✓ Second pass completed"
            fi
            
            # Third pass for references
            echo "🔨 Third pass (pdflatex)..."
            if ! pdflatex -interaction=nonstopmode -halt-on-error "$base.tex" > /dev/null 2>&1; then
              echo "⚠️  Third pass had issues, but continuing..."
            else
              echo "   ✓ Third pass completed"
            fi
            
            # Check if PDF was created
            if [ -f "$base.pdf" ]; then
              pdf_size=$(du -h "$base.pdf" | cut -f1)
              echo "✅ Successfully compiled: $base.pdf (size: $pdf_size)"
            else
              echo "❌ Failed to compile: $tex_file - PDF not created"
              echo ""
              echo "   Last few lines of LaTeX output:"
              pdflatex -interaction=nonstopmode "$base.tex" 2>&1 | tail -20
              cd - > /dev/null
              return 1
            fi
            
            cd - > /dev/null
            return 0
          }

          # Track compilation results
          successful=0
          failed=0
          
          # Find all main LaTeX files (proposal.tex, main.tex, slides.tex)
          echo "🔍 Searching for LaTeX files in output directory..."
          echo ""
          
          # Compile proposal reports
          if find output -name "proposal.tex" -type f | grep -q .; then
            echo "📄 Found proposal reports:"
            find output -name "proposal.tex" -type f | while read file; do
              if compile_latex "$file"; then
                successful=$((successful + 1))
              else
                failed=$((failed + 1))
              fi
            done
          fi
          
          # Compile major project reports
          if find output -name "main.tex" -type f | grep -q .; then
            echo "📚 Found major project reports:"
            find output -name "main.tex" -type f | while read file; do
              if compile_latex "$file"; then
                successful=$((successful + 1))
              else
                failed=$((failed + 1))
              fi
            done
          fi
          
          # Compile presentation slides
          if find output -name "slides.tex" -type f | grep -q .; then
            echo "🎯 Found presentation slides:"
            find output -name "slides.tex" -type f | while read file; do
              if compile_latex "$file"; then
                successful=$((successful + 1))
              else
                failed=$((failed + 1))
              fi
            done
          fi
          
          # Summary
          echo ""
          echo "=========================================="
          echo "📊 Compilation Results"
          echo "=========================================="
          echo "✅ Successful: $successful"
          echo "❌ Failed: $failed"
          echo "=========================================="

      - name: List compiled PDFs
        run: |
          echo "📄 Compiled PDF files:"
          echo "====================="
          if find output -name "*.pdf" -type f | grep -q .; then
            find output -name "*.pdf" -type f -exec ls -lh {} \;
          else
            echo "⚠️  No PDFs found in output directory"
            echo ""
            echo "Contents of output directory:"
            find output -type f | head -20
          fi

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compiled-pdfs-${{ github.run_number }}
          path: output/**/*.pdf
          retention-days: 30
          if-no-files-found: warn

      - name: Compilation Summary
        if: always()
        run: |
          echo ""
          echo "📊 FINAL COMPILATION SUMMARY"
          echo "================================"
          pdf_count=$(find output -name "*.pdf" -type f | wc -l)
          tex_count=$(find output -name "*.tex" -type f | wc -l)
          
          echo "📝 Total .tex files found: $tex_count"
          echo "📄 Total PDFs generated: $pdf_count"
          echo ""
          
          if [ $pdf_count -gt 0 ]; then
            echo "✅ COMPILATION SUCCESSFUL!"
            echo ""
            echo "📥 Download your PDFs from the Artifacts section below:"
            echo "   - Click on 'compiled-pdfs-${{ github.run_number }}'"
            echo ""
            echo "🔗 Direct link:"
            echo "   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "⚠️  NO PDFS WERE GENERATED"
            echo ""
            echo "Possible reasons:"
            echo "   1. No .tex files found in output/ directory"
            echo "   2. LaTeX compilation errors (check logs above)"
            echo "   3. Missing required LaTeX packages"
            echo ""
            echo "🔍 Check the 'Find and compile LaTeX files' step above for errors"
          fi