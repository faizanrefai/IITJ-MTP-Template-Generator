name: Compile LaTeX to PDF

on:
  push:
    branches: [main, master]
    paths:
      - "output/**/*.tex"
      - ".github/workflows/compile-latex.yml"
  workflow_dispatch:
    inputs:
      report_path:
        description: "Path to report directory (e.g., output/my-project)"
        required: false
        default: "output"

jobs:
  compile-latex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache LaTeX packages
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/texlive
            ~/.texlive
          key: ${{ runner.os }}-texlive-full-2023
          restore-keys: |
            ${{ runner.os }}-texlive-full-
            ${{ runner.os }}-texlive-

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-bibtex-extra \
            texlive-science \
            texlive-publishers \
            texlive-lang-english \
            biber

      - name: Find and compile LaTeX files
        run: |
          echo "🔍 Current directory structure:"
          echo "================================="
          ls -la
          echo ""
          
          echo "🔍 Checking output directory:"
          if [ -d "output" ]; then
            echo "✅ output directory exists"
            echo "📁 Contents of output:"
            ls -la output/
            echo ""
            echo "📁 Full file tree:"
            find output -type f | head -30
          else
            echo "❌ output directory does NOT exist!"
            exit 1
          fi
          
          echo ""
          echo "🔍 Searching for .tex files:"
          tex_files=$(find output -name "*.tex" -type f)
          if [ -n "$tex_files" ]; then
            echo "✅ Found .tex files:"
            echo "$tex_files"
          else
            echo "❌ No .tex files found in output/"
            exit 1
          fi
          
          # Function to compile a LaTeX file
          compile_latex() {
            local tex_file="$1"
            local dir=$(dirname "$tex_file")
            local base=$(basename "$tex_file" .tex)
            
            echo ""
            echo "=========================================="
            echo "📝 Compiling: $tex_file"
            echo "=========================================="
            cd "$dir"
            
            echo "📁 Working directory: $(pwd)"
            echo ""
            
            # First pass
            echo "🔨 First pass (pdflatex)..."
            pdflatex -interaction=nonstopmode "$base.tex" 2>&1 | tee /tmp/latex_output.txt
            echo ""
            
            # Check if compilation had critical errors
            if grep -q "^!" /tmp/latex_output.txt; then
              echo "❌ LaTeX errors detected!"
              echo "Error details:"
              grep -A 3 "^!" /tmp/latex_output.txt
            fi
            
            # Run bibtex if bib file exists and aux file references it
            if [ -f "$base.aux" ] && grep -q "bibdata" "$base.aux" 2>/dev/null; then
              echo "📚 Running BibTeX..."
              bibtex "$base"
              echo ""
            fi
            
            # Second pass
            echo "🔨 Second pass (pdflatex)..."
            pdflatex -interaction=nonstopmode "$base.tex" > /dev/null 2>&1
            
            # Third pass
            echo "🔨 Third pass (pdflatex)..."
            pdflatex -interaction=nonstopmode "$base.tex" > /dev/null 2>&1
            
            if [ -f "$base.pdf" ]; then
              pdf_size=$(du -h "$base.pdf" | cut -f1)
              echo "✅ Successfully compiled: $base.pdf (size: $pdf_size)"
            else
              echo "❌ Failed to compile: $tex_file - PDF not created"
            fi
            
            cd - > /dev/null
            echo ""
          }
          
          # Compile all .tex files found
          find output -name "*.tex" -type f | while read file; do
            compile_latex "$file"
          done

      - name: List compiled PDFs
        run: |
          echo ""
          echo "📄 Compiled PDF files:"
          echo "====================="
          if find output -name "*.pdf" -type f | grep -q .; then
            find output -name "*.pdf" -type f -exec ls -lh {} \;
          else
            echo "⚠️ No PDFs found in output directory"
          fi

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compiled-pdfs-${{ github.run_number }}
          path: output/**/*.pdf
          retention-days: 30
          if-no-files-found: warn

      - name: Compilation Summary
        if: always()
        run: |
          echo ""
          echo "📊 FINAL COMPILATION SUMMARY"
          echo "================================"
          pdf_count=$(find output -name "*.pdf" -type f 2>/dev/null | wc -l)
          tex_count=$(find output -name "*.tex" -type f 2>/dev/null | wc -l)
          
          echo "📝 Total .tex files found: $tex_count"
          echo "📄 Total PDFs generated: $pdf_count"
          echo ""
          
          if [ $pdf_count -gt 0 ]; then
            echo "✅ COMPILATION SUCCESSFUL!"
            echo ""
            echo "📥 Download your PDFs from the Artifacts section below"
          else
            echo "⚠️ NO PDFS WERE GENERATED"
            echo ""
            echo "Check the 'Find and compile LaTeX files' step above for errors"
          fi
